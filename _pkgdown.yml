url: https://hchulkim.github.io/rblp

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: "rblp: BLP Demand Estimation in R"
  description: >
    Estimate, simulate, and analyze demand for differentiated products
    using BLP random coefficients logit models. Translated from pyblp.

development:
  mode: auto

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: "Getting Started"
        - text: "Getting Started with rblp"
          href: articles/rblp-tutorial.html
        - text: "-------"
        - text: "Model Estimation"
        - text: "Logit and Nested Logit Models"
          href: articles/logit-nested-logit.html
        - text: "Random Coefficients Logit"
          href: articles/random-coefficients.html
        - text: "-------"
        - text: "Post-Estimation"
        - text: "Post-Estimation and Merger Simulation"
          href: articles/post-estimation-mergers.html
        - text: "-------"
        - text: "Tutorials & Exercises"
        - text: "Mixtape Demand Estimation Exercises"
          href: articles/mixtape-exercises.html
        - text: "Simulation and Monte Carlo"
          href: articles/simulation-monte-carlo.html
        - text: "Replicating baby_BLP: OTC Drug Demand"
          href: articles/baby-blp-replication.html

articles:
  - title: "Getting Started"
    desc: >
      Start here for a quick overview of the rblp package, covering
      logit estimation, random coefficients, simulation, and merger analysis.
    navbar: ~
    contents:
      - rblp-tutorial
  - title: "Model Estimation"
    desc: >
      Detailed guides on estimating demand models, from the plain logit
      to the full random coefficients BLP specification with demographics.
    navbar: ~
    contents:
      - logit-nested-logit
      - random-coefficients
  - title: "Post-Estimation & Policy Analysis"
    desc: >
      Use estimated demand parameters to compute elasticities, consumer surplus,
      markups, diversion ratios, and simulate the effects of mergers.
    navbar: ~
    contents:
      - post-estimation-mergers
  - title: "Tutorials & Exercises"
    desc: >
      Hands-on tutorials for learning BLP estimation, including Mixtape Sessions
      exercises and Monte Carlo simulation studies.
    navbar: ~
    contents:
      - mixtape-exercises
      - simulation-monte-carlo
      - baby-blp-replication

reference:
  - title: "Problem Setup"
    desc: "Define model formulations and create estimation problems."
    contents:
      - blp_formulation
      - BLPFormulation
      - blp_problem
      - BLPProblem

  - title: "Estimation Configuration"
    desc: "Configure integration, iteration, and optimization for estimation."
    contents:
      - blp_integration
      - BLPIntegration
      - blp_iteration
      - BLPIteration
      - blp_optimization
      - BLPOptimization

  - title: "Results"
    desc: "Post-estimation analysis: elasticities, surplus, mergers, and more."
    contents:
      - BLPResults

  - title: "Simulation"
    desc: "Simulate equilibrium data for testing and Monte Carlo studies."
    contents:
      - blp_simulation
      - BLPSimulation
      - BLPSimulationResults
      - build_id_data

  - title: "Micro Moments"
    desc: "Match micro-level data moments to model predictions."
    contents:
      - micro_dataset
      - MicroDataset
      - micro_part
      - MicroPart
      - micro_moment
      - MicroMoment

  - title: "Instruments and Data Construction"
    desc: "Construct instruments and generate panel structures."
    contents:
      - build_blp_instruments
      - build_differentiation_instruments
      - build_custom_ownership

  - title: "Bundled Datasets"
    desc: >
      Bundled empirical datasets for replicating published results.
      The Nevo (2000) cereal data and BLP (1995) automobile data
      are the standard benchmarks in the differentiated products literature.
    contents:
      - load_nevo_products
      - load_nevo_agents
      - load_blp_products
      - load_blp_agents
      - nevo_products
      - nevo_agents
      - blp_products
      - blp_agents
      - load_mixtape_products
      - load_mixtape_demographics
      - prepare_mixtape_data
      - mixtape_products
      - mixtape_demographics
      - load_otc_products

  - title: "Options"
    desc: "Package-wide configuration options."
    contents:
      - rblp_options

  - title: "Package"
    contents:
      - rblp-package
